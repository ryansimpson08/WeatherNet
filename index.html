<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced NWS Weather Hub</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #1a2a3a;
            --accent: #00d2ff;
            --danger: #ff4d4d;
            --card-bg: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: #eceff1; color: #333; }
        
        /* Search & Header */
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .search-container { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        input[type="text"] { padding: 10px; border-radius: 20px; border: none; width: 250px; outline: none; }
        button.search-btn { padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); cursor: pointer; font-weight: bold; }

        /* Tabs */
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #ccc; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { padding: 15px 30px; cursor: pointer; border: none; background: none; font-weight: 600; color: #666; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .tab-content { display: none; padding: 25px; max-width: 1200px; margin: auto; }
        .tab-content.active { display: block; }

        /* Forecast - Horizontal Style */
        .forecast-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 15px; 
            padding: 10px 0;
            scrollbar-width: thin;
        }
        .forecast-card { 
            min-width: 160px; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .forecast-card img { width: 60px; height: 60px; margin: 10px 0; border-radius: 50%; border: 2px solid #f0f0f0; }

        /* Data Grid */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .data-point { background: white; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #ddd; }

        /* Radar Map */
        #map { height: 75vh; width: 100%; border-radius: 12px; }
        .info-panel { background: white; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; text-align: center; color: #555; }
        
        .alert-box { background: #fff1f1; border-left: 5px solid var(--danger); padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>NWS Weather Command</h1>
    <div class="search-container">
        <input type="text" id="location-input" placeholder="Enter City or Zip (e.g. Dallas, TX)">
        <button class="search-btn" onclick="searchLocation()">Search</button>
    </div>
    <p id="location-display" style="margin-top: 15px; opacity: 0.8;">Loading current location...</p>
</header>

<nav class="tab-bar">
    <button class="tab-btn active" onclick="showTab('quick')">Quick Display</button>
    <button class="tab-btn" onclick="showTab('forecast')">Forecasts</button>
    <button class="tab-btn" onclick="showTab('data')">Data</button>
    <button class="tab-btn" onclick="showTab('radar')">Radar</button>
</nav>

<div id="quick" class="tab-content active">
    <h3>Active Warnings & Advisories</h3>
    <div id="alerts-container">Scanning for NWS alerts...</div>
</div>

<div id="forecast" class="tab-content">
    <h3>7-Day Outlook (Day & Night)</h3>
    <div class="forecast-scroll" id="forecast-container"></div>
</div>

<div id="data" class="tab-content">
    <h3>Technical Data Points</h3>
    <div class="data-grid">
        <div class="data-point"><h4>Temp</h4><p id="d-temp">--</p></div>
        <div class="data-point"><h4>Barometric</h4><p id="d-baro">--</p></div>
        <div class="data-point"><h4>Humidity</h4><p id="d-hum">--</p></div>
        <div class="data-point"><h4>Wind</h4><p id="d-wind">--</p></div>
    </div>
</div>

<div id="radar" class="tab-content">
    <div id="map"></div>
    <div class="info-panel">Click on a state to highlight it and zoom in on live radar.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let currentLat = 38.89, currentLon = -77.03; 
    let map, stateLayer;
    const USER_AGENT = "WeatherDashboardProject/1.0 (contact@example.com)";

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'radar') setTimeout(() => map.invalidateSize(), 100);
    }

    // MAP SETUP
    function initMap() {
        map = L.map('map').setView([37.8, -96], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // NWS Radar Overlay
        L.tileLayer.wms("https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/wms", {
            layers: 'conus_bref_qcd', format: 'image/png', transparent: true, opacity: 0.6
        }).addTo(map);

        // Load US States for highlighting
        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
            .then(res => res.json())
            .then(data => {
                stateLayer = L.geoJson(data, {
                    style: { color: '#333', weight: 1, fillOpacity: 0.1 },
                    onEachFeature: (feature, layer) => {
                        layer.on('click', (e) => {
                            stateLayer.setStyle({ fillOpacity: 0.1, color: '#333' }); // Reset others
                            layer.setStyle({ fillOpacity: 0.3, color: '#00d2ff', weight: 3 }); // Highlight
                            map.fitBounds(layer.getBounds());
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            });
    }

    // SEARCH FUNCTIONALITY
    async function searchLocation() {
        const query = document.getElementById('location-input').value;
        if (!query) return;
        
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&countrycodes=us`);
        const results = await res.json();
        
        if (results.length > 0) {
            currentLat = results[0].lat;
            currentLon = results[0].lon;
            map.flyTo([currentLat, currentLon], 8);
            updateWeather();
        } else {
            alert("Area not found. Please try a different city or state.");
        }
    }

    // NWS DATA FETCHING
    async function updateWeather() {
        try {
            const pointRes = await fetch(`https://api.weather.gov/points/${currentLat},${currentLon}`, { headers: { "User-Agent": USER_AGENT } });
            const points = await pointRes.json();
            
            document.getElementById('location-display').innerText = `Reporting from: ${points.properties.relativeLocation.properties.city}, ${points.properties.relativeLocation.properties.state}`;

            // Forecasts
            const fRes = await fetch(points.properties.forecast, { headers: { "User-Agent": USER_AGENT } });
            const fData = await fRes.json();
            renderForecast(fData.properties.periods);

            // Observations
            const sRes = await fetch(points.properties.observationStations, { headers: { "User-Agent": USER_AGENT } });
            const sData = await sRes.json();
            const latestRes = await fetch(`${sData.features[0].id}/observations/latest`, { headers: { "User-Agent": USER_AGENT } });
            const obs = await latestRes.json();
            renderObservations(obs.properties);

            // Alerts
            fetchAlerts(currentLat, currentLon);

        } catch (e) { console.error(e); }
    }

    function renderForecast(periods) {
        const container = document.getElementById('forecast-container');
        container.innerHTML = periods.map(p => `
            <div class="forecast-card">
                <div style="font-size: 0.8rem; font-weight: bold; color: #777;">${p.name}</div>
                <img src="${p.icon}" alt="weather">
                <div style="font-size: 1.2rem; font-weight: bold;">${p.temperature}°${p.temperatureUnit}</div>
                <div style="font-size: 0.7rem; margin-top: 5px;">${p.shortForecast}</div>
            </div>
        `).join('');
    }

    function renderObservations(p) {
        const tempF = (p.temperature.value * 9/5) + 32;
        const baroIn = p.barometricPressure.value * 0.0002953;
        document.getElementById('d-temp').innerText = `${tempF.toFixed(1)}°F`;
        document.getElementById('d-baro').innerText = `${baroIn.toFixed(2)} inHg`;
        document.getElementById('d-hum').innerText = `${p.relativeHumidity.value.toFixed(0)}%`;
        document.getElementById('d-wind').innerText = `${p.windSpeed.value.toFixed(1)} km/h`;
    }

    async function fetchAlerts(lat, lon) {
        const res = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`, { headers: { "User-Agent": USER_AGENT } });
        const data = await res.json();
        const container = document.getElementById('alerts-container');
        container.innerHTML = data.features.length ? data.features.map(f => `
            <div class="alert-box">
                <strong>${f.properties.event}</strong><br>
                <small>${f.properties.headline}</small>
            </div>
        `).join('') : "No active alerts for this location.";
    }

    initMap();
    updateWeather();
</script>

</body>
</html>
