<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherNet | Command Center v38.9</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@800&family=JetBrains+Mono:wght@500&display=swap');

        * { box-sizing: border-box; }
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #4d7cff; --text: #f8fafc;
            --text-dim: #94a3b8; --warning: #facc15; --danger: #ef4444; --success: #22c55e;
        }

        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* NAV */
        .nav-ribbon { height: 64px; background: var(--surface); border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; z-index: 4000; flex-shrink: 0; gap: 20px; }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--accent); display: flex; align-items: center; gap: 8px; font-style: italic; transform: skewX(-5deg); }
        .search-container { flex: 1; max-width: 400px; position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; background: var(--bg); border: 1px solid #334155; border-radius: 8px; padding: 8px 12px 8px 35px; color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
        .nav-buttons { display: flex; gap: 8px; background: var(--bg); padding: 4px; border-radius: 8px; }
        .nav-btn { padding: 6px 16px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; font-size: 0.8rem; cursor: pointer; border-radius: 6px; }
        .nav-btn.active { background: var(--surface); color: var(--accent); }
        .unit-toggle-container { display: flex; background: var(--bg); padding: 2px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; }
        .unit-choice { padding: 6px 14px; font-family: 'JetBrains Mono'; font-size: 0.7rem; font-weight: 800; border-radius: 6px; color: var(--text-dim); }
        .unit-choice.active { background: var(--accent); color: white; }

        .hazard-status-ribbon { height: 30px; background: #020617; border-bottom: 1px solid #1e293b; display: none; align-items: center; padding: 0 1.5rem; gap: 20px; font-family: 'JetBrains Mono'; font-size: 0.65rem; color: var(--text-dim); z-index: 3999; }
        .hazard-status-ribbon.active { display: flex; }
        .h-val { color: var(--warning); font-weight: 800; }
        .location-bar { height: 35px; background: #1e293b; border-bottom: 2px solid var(--accent); padding: 0 1.5rem; display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }

        main { flex-grow: 1; position: relative; overflow: hidden; }
        .tab-content { display: none; height: 100%; width: 100%; overflow-y: auto; padding: 30px; }
        .tab-content.active { display: block; }

        /* DASHBOARD */
        .dashboard-container { width: 100%; max-width: 900px; background: var(--surface); border-radius: 16px; border: 1px solid #334155; padding: 30px; margin: 0 auto 20px auto; }
        .main-stats { display: grid; grid-template-columns: 1.1fr 1.1fr; gap: 20px; margin-top: 20px; }
        .temp-display { font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; font-family: 'Orbitron'; }
        .metric-card { background: var(--bg); padding: 15px; border-radius: 12px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .metric-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        .forecast-row { background: var(--surface); border: 1px solid #334155; border-radius: 12px; padding: 15px 25px; display: grid; grid-template-columns: 140px 60px 1fr 80px; align-items: center; margin-bottom: 10px; }
        .alert-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 15px; border-left: 4px solid var(--accent); }

        /* RADAR UI */
        #radar-tab.active { display: block; padding: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #0b0f1a; }
        .playback-container { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 650px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid #475569; border-radius: 12px; padding: 15px 25px; z-index: 2000; display: flex; align-items: center; gap: 20px; }
        .play-btn { background: var(--accent); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s; }
        .play-btn:active { transform: scale(0.9); }
        .progress-wrapper { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #334155; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -6px; box-shadow: 0 0 10px var(--accent); }
        .time-info { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 0.75rem; font-weight: 700; color: var(--text-dim); }
        .active-time { color: var(--accent); background: rgba(77, 124, 255, 0.1); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(77, 124, 255, 0.3); }

        .radar-overlay-sidebar { position: absolute; top: 15px; right: 15px; width: 280px; max-height: calc(100% - 180px); background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 12px; z-index: 2000; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 12px; border-bottom: 1px solid #334155; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--accent); }
        .filter-dropdown { position: absolute; top: 15px; left: 15px; z-index: 2000; }
        .filter-trigger { background: var(--surface); color: var(--text); border: 1px solid #334155; padding: 10px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.7rem; }
        .filter-content { display: none; position: absolute; top: 100%; left: 0; margin-top: 8px; width: 180px; background: var(--surface); border: 1px solid #334155; border-radius: 12px; padding: 8px; }
        .filter-content.active { display: block; }
        .filter-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 6px; cursor: pointer; }
        .tgl { width: 30px; height: 16px; background: #475569; border-radius: 10px; position: relative; }
        .tgl::after { content: ''; position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .tgl.on { background: var(--accent); }
        .tgl.on::after { left: 16px; }
    </style>
</head>
<body>

<nav class="nav-ribbon">
    <div class="brand"><i data-lucide="zap" style="color:var(--warning)"></i>WEATHERNET</div>
    <div class="search-container">
        <i data-lucide="search" style="position:absolute; left:12px; color:var(--text-dim); width:16px;"></i>
        <input type="text" id="location-search" class="search-input" placeholder="City or Zip Code..." onkeydown="if(event.key==='Enter') searchLocation()">
    </div>
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="switchTab('quick-view', this)">Quick View</button>
        <button class="nav-btn" onclick="switchTab('forecast', this)">Forecast</button>
        <button class="nav-btn" onclick="switchTab('radar-tab', this)">Radar</button>
    </div>
    <div class="unit-toggle-container" onclick="toggleUnitSystem()">
        <div id="choice-us" class="unit-choice active">US</div>
        <div id="choice-si" class="unit-choice">SI</div>
    </div>
</nav>

<div id="hazard-ribbon" class="hazard-status-ribbon">
    <span>SYSTEM: <span style="color:#22c55e">NOMINAL</span></span>
    <span>TOR: <span id="count-tor" class="h-val">0</span></span>
    <span>SVR: <span id="count-svr" class="h-val">0</span></span>
    <span>FFW: <span id="count-ffw" class="h-val">0</span></span>
</div>

<div class="location-bar">
    <i data-lucide="map-pin" style="width:14px; color:var(--accent)"></i>
    LOCATION: <span id="global-city-display">Syncing...</span>
</div>

<main>
    <section id="quick-view" class="tab-content active">
        <div class="dashboard-container">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px;">
                <h2 style="margin:0; font-size: 1rem; text-transform: uppercase;">Current Conditions</h2>
                <div id="station-display" style="font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--accent);">WFO: --</div>
            </div>
            <div class="main-stats">
                <div style="display: flex; align-items: center; gap: 25px;">
                    <div id="weather-icon"><i data-lucide="cloud-sun" style="width: 70px; height: 70px; color: var(--warning);"></i></div>
                    <div>
                        <div class="temp-display" id="temp">--°</div>
                        <div id="condition-desc" style="font-size: 1.2rem; color: var(--text-dim);">Scanning...</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div class="metric-card"><span class="metric-label">Wind</span><div id="wind">--</div></div>
                    <div class="metric-card"><span class="metric-label">Humidity</span><div id="humidity">--%</div></div>
                    <div class="metric-card"><span class="metric-label">Pressure</span><div id="pressure">--</div></div>
                    <div class="metric-card"><span class="metric-label">Visibility</span><div id="vis-value">--</div></div>
                    <div class="metric-card" id="lightning-card" style="grid-column: span 2; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <span class="metric-label">Lightning (<span id="lightning-unit-label">30mi</span>)</span>
                            <div id="lightning-status" style="font-weight: 800; font-family: 'JetBrains Mono'; color: var(--text-dim);">SCANNING...</div>
                        </div>
                        <i id="lightning-icon" data-lucide="zap" style="color: var(--text-dim); width: 24px;"></i>
                    </div>
                </div>
            </div>
            <div id="local-alerts-list" style="margin-top: 20px;"></div>
        </div>
    </section>

    <section id="forecast" class="tab-content">
        <div id="forecast-grid" style="max-width: 850px; margin: 0 auto;"></div>
    </section>

    <section id="radar-tab" class="tab-content">
        <div id="map"></div>
        <div class="filter-dropdown">
            <div class="filter-trigger" onclick="document.getElementById('f-menu').classList.toggle('active')"><i data-lucide="layers" style="width:16px;"></i> HAZARD FILTERS</div>
            <div class="filter-content" id="f-menu">
                <div class="filter-item" onclick="toggleHazardLayer('severe')"><span style="color:#FF0000">SEVERE</span><div id="tgl-severe" class="tgl on"></div></div>
                <div class="filter-item" onclick="toggleHazardLayer('flood')"><span style="color:#00FF00">FLOOD</span><div id="tgl-flood" class="tgl on"></div></div>
                <div class="filter-item" onclick="toggleHazardLayer('marine')"><span style="color:#00FFFF">MARINE</span><div id="tgl-marine" class="tgl on"></div></div>
            </div>
        </div>
        <div class="radar-overlay-sidebar">
            <div id="sidebar-header" class="sidebar-header">National Hazards</div>
            <div style="overflow-y: auto; flex: 1; padding: 10px;" id="map-alerts-container"></div>
        </div>
        <div class="playback-container">
            <button class="play-btn" onclick="toggleRadarLoop()"><i data-lucide="play" id="play-icon" style="width:20px; fill:white;"></i></button>
            <div class="progress-wrapper">
                <div class="time-info">
                    <span id="start-time">--:--</span>
                    <span id="current-time" class="active-time">SYNC...</span>
                    <span id="end-time">--:--</span>
                </div>
                <input type="range" id="radar-progress" min="0" max="0" value="0" step="1" oninput="manualSeek(this.value)">
            </div>
        </div>
    </section>
</main>

<script>
    let currentLat = 34.6059, currentLon = -86.9833, units = 'us';
    let map, stateLayer, activeStateLayer = null, radarLayers = [], timestamps = [], radarInterval = null, currentFrameIndex = 0;
    const hazardGroups = { severe: L.layerGroup(), flood: L.layerGroup(), marine: L.layerGroup() };
    let weatherCache = null, locationMarker;
    const UA = "WeatherNet_v38.9_GitHub_Stable";

    const STATE_CODES = {"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","NV":"Nevada","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"};

    window.onload = () => { initMap(); getWeatherData(); lucide.createIcons(); };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: true, minZoom: 3 }).setView([38, -97], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);
        Object.values(hazardGroups).forEach(g => g.addTo(map));
        locationMarker = L.circleMarker([currentLat, currentLon], { radius: 8, fillColor: "#4d7cff", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(map);
        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json').then(r => r.json()).then(data => {
            stateLayer = L.geoJson(data, {
                style: { color:'#4d7cff', weight:1, fillOpacity:0.05 },
                onEachFeature: (f, l) => {
                    l.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        if (activeStateLayer === l) { resetMap(); } else {
                            stateLayer.setStyle({ color:'#4d7cff', weight:1, fillOpacity:0.05 });
                            l.setStyle({ color:'var(--warning)', weight:3, fillOpacity:0.2 });
                            activeStateLayer = l; map.fitBounds(l.getBounds()); fetchMapAlerts(f.properties.name);
                        }
                    });
                }
            }).addTo(map);
        });
        loadRadar(); fetchGlobalHazards();
    }

    async function loadRadar() {
        try {
            const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
            const data = await res.json();
            const frames = data.radar.past;
            radarLayers.forEach(l => map.removeLayer(l));
            timestamps = frames.map(f => f.time);
            radarLayers = frames.map(f => {
                return L.tileLayer(`https://tilecache.rainviewer.com${f.path}/256/{z}/{x}/{y}/2/1_1.png`, {
                    opacity: 0,
                    zIndex: 500,
                    tileSize: 256,
                    updateWhenIdle: true,
                    // PREVENTS RADAR DISAPPEARING ON ZOOM
                    maxNativeZoom: 12, 
                    maxZoom: 18,
                    attribution: 'RainViewer'
                }).addTo(map);
            });
            document.getElementById('radar-progress').max = radarLayers.length - 1;
            document.getElementById('start-time').innerText = new Date(timestamps[0]*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('end-time').innerText = new Date(timestamps[timestamps.length-1]*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            updateFrame(radarLayers.length - 1);
        } catch (e) {
            console.error("Radar Fail", e);
            document.getElementById('current-time').innerText = "RADAR OFFLINE";
        }
    }

    function updateFrame(idx) {
        currentFrameIndex = idx;
        radarLayers.forEach((l, i) => l.setOpacity(i == idx ? 0.7 : 0));
        document.getElementById('current-time').innerText = new Date(timestamps[idx]*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('radar-progress').value = idx;
    }

    function toggleRadarLoop() {
        const icon = document.getElementById('play-icon');
        if (radarInterval) { clearInterval(radarInterval); radarInterval = null; icon.setAttribute('data-lucide', 'play'); } 
        else {
            icon.setAttribute('data-lucide', 'pause');
            radarInterval = setInterval(() => { currentFrameIndex = (currentFrameIndex + 1) % radarLayers.length; updateFrame(currentFrameIndex); }, 600);
        }
        lucide.createIcons();
    }

    function manualSeek(val) { if (radarInterval) toggleRadarLoop(); updateFrame(parseInt(val)); }

    async function fetchGlobalHazards() {
        try {
            const res = await fetch(`https://api.weather.gov/alerts/active`, { headers: {'User-Agent': UA} });
            const data = await res.json();
            let counts = { tor: 0, svr: 0, ffw: 0 };
            data.features.forEach(f => {
                if (!f.geometry) return;
                const ev = f.properties.event;
                if (ev.includes("Tornado")) counts.tor++;
                if (ev.includes("Thunderstorm")) counts.svr++;
                if (ev.includes("Flash Flood")) counts.ffw++;
                let cat = ev.toLowerCase().includes('flood') ? 'flood' : (ev.toLowerCase().includes('marine') ? 'marine' : 'severe');
                L.geoJSON(f, { 
                    style: { color: getNWSColor(ev), weight: 2, fillOpacity: 0.2, fillColor: getNWSColor(ev) },
                    onEachFeature: (feature, layer) => {
                        layer.bindPopup(`<strong>${feature.properties.event}</strong><br>${feature.properties.headline}`);
                        layer.on('mouseover', function() { this.setStyle({ fillOpacity: 0.5 }); this.openPopup(); });
                        layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.2 }); this.closePopup(); });
                    }
                }).addTo(hazardGroups[cat]);
            });
            document.getElementById('count-tor').innerText = counts.tor;
            document.getElementById('count-svr').innerText = counts.svr;
            document.getElementById('count-ffw').innerText = counts.ffw;
        } catch(e) { console.warn("Hazards fail"); }
    }

    function toggleHazardLayer(cat) {
        const tgl = document.getElementById(`tgl-${cat}`);
        tgl.classList.toggle('on');
        if (tgl.classList.contains('on')) map.addLayer(hazardGroups[cat]); else map.removeLayer(hazardGroups[cat]);
    }

    async function getWeatherData() {
        try {
            const p = await (await fetch(`https://api.weather.gov/points/${currentLat.toFixed(4)},${currentLon.toFixed(4)}`, { headers: {'User-Agent': UA} })).json();
            const fData = await (await fetch(p.properties.forecast, { headers: {'User-Agent': UA} })).json();
            const obsData = await (await fetch(p.properties.observationStations, { headers: {'User-Agent': UA} })).json();
            const latest = await (await fetch(`${obsData.features[0].id}/observations/latest`, { headers: {'User-Agent': UA} })).json();
            weatherCache = { point: p, forecast: fData, obs: latest.properties };
            renderWeather(); fetchLightningNearby(currentLat, currentLon);
        } catch (e) { console.error("Weather data sync issue"); }
    }

    function renderWeather() {
        if (!weatherCache) return;
        const p = weatherCache.point; const periods = weatherCache.forecast.properties.periods; const obs = weatherCache.obs;
        const toC = (f) => Math.round((f - 32) * 5 / 9);
        const toKph = (m) => Math.round(parseInt(m) * 1.609);
        document.getElementById('lightning-unit-label').innerText = units === 'us' ? '30mi' : '48km';
        document.getElementById('global-city-display').innerText = `${p.properties.relativeLocation.properties.city}, ${p.properties.relativeLocation.properties.state}`;
        document.getElementById('station-display').innerText = `WFO: ${p.properties.gridId}`;
        document.getElementById('temp').innerText = units === 'us' ? `${periods[0].temperature}°` : `${toC(periods[0].temperature)}°`;
        document.getElementById('condition-desc').innerText = periods[0].shortForecast;
        if (units === 'us') {
            document.getElementById('wind').innerText = periods[0].windSpeed;
            document.getElementById('pressure').innerText = (obs.barometricPressure.value * 0.0002953).toFixed(2) + " in";
            document.getElementById('vis-value').innerText = (obs.visibility.value / 1609.34).toFixed(1) + " mi";
        } else {
            document.getElementById('wind').innerText = toKph(periods[0].windSpeed) + " km/h";
            document.getElementById('pressure').innerText = (obs.barometricPressure.value / 100).toFixed(1) + " hPa";
            document.getElementById('vis-value').innerText = (obs.visibility.value / 1000).toFixed(1) + " km";
        }
        document.getElementById('humidity').innerText = Math.round(obs.relativeHumidity.value || 0) + "%";
        document.getElementById('forecast-grid').innerHTML = periods.map(per => `
            <div class="forecast-row">
                <div>${per.name}</div>
                <div><i data-lucide="${getIcon(per.shortForecast)}" style="color:${per.isDaytime?'var(--warning)':'var(--text-dim)'}"></i></div>
                <div style="color:var(--text-dim)">${per.shortForecast}</div>
                <div style="font-family:'Orbitron'; font-weight:800; text-align:right;">${units === 'us' ? per.temperature : toC(per.temperature)}°</div>
            </div>`).join('');
        lucide.createIcons(); fetchLocalAlerts(p.properties.relativeLocation.properties.state);
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        document.getElementById('hazard-ribbon').style.display = (tabId === 'radar-tab') ? 'flex' : 'none';
        if (tabId === 'radar-tab' && map) setTimeout(() => map.invalidateSize(), 100);
    }

    function toggleUnitSystem() {
        units = units === 'us' ? 'si' : 'us';
        document.getElementById('choice-us').classList.toggle('active', units === 'us');
        document.getElementById('choice-si').classList.toggle('active', units === 'si');
        if (weatherCache) renderWeather();
    }

    function resetMap() { stateLayer.setStyle({ color:'#4d7cff', weight:1, fillOpacity:0.05 }); activeStateLayer = null; map.setView([38, -97], 4); document.getElementById('map-alerts-container').innerHTML = ""; }

    async function fetchMapAlerts(sName) {
        const res = await fetch(`https://api.weather.gov/alerts/active?area=${STATE_CODES[sName]}`, { headers: {'User-Agent': UA} });
        const data = await res.json();
        document.getElementById('map-alerts-container').innerHTML = data.features.map(f => `<div class="alert-card" style="border-left-color:${getNWSColor(f.properties.event)}; font-size:0.7rem;"><strong>${f.properties.event}</strong><br>${f.properties.headline}</div>`).join('') || "<div style='text-align:center; padding:20px; color:var(--text-dim)'>No active threats.</div>";
    }

    async function fetchLocalAlerts(state) {
        const res = await fetch(`https://api.weather.gov/alerts/active?area=${state}`, { headers: {'User-Agent': UA} });
        const data = await res.json();
        document.getElementById('local-alerts-list').innerHTML = data.features.length > 0 ? data.features.map(f => `<div class="alert-card" style="border-left-color:${getNWSColor(f.properties.event)}"><b>${f.properties.event}</b><br>${f.properties.headline}</div>`).join('') : `<div style="text-align: center; padding: 20px; color: var(--text-dim); width: 100%;">No local alerts.</div>`;
    }

    function getNWSColor(ev) {
        if (ev.includes("Tornado")) return "#FF0000";
        if (ev.includes("Severe Thunderstorm")) return "#FFA500";
        if (ev.includes("Flash Flood")) return "#8B0000";
        if (ev.includes("Flood")) return "#00FF00";
        return "var(--accent)";
    }

    function getIcon(d) { d = d.toLowerCase(); if (d.includes("sun") || d.includes("clear")) return "sun"; if (d.includes("rain")) return "cloud-rain"; if (d.includes("storm")) return "cloud-lightning"; return "cloud"; }

    async function fetchLightningNearby(lat, lon) {
        const res = await fetch(`https://api.weather.gov/alerts/active?point=${lat.toFixed(4)},${lon.toFixed(4)}`, { headers: {'User-Agent': UA} });
        const data = await res.json();
        const st = document.getElementById('lightning-status');
        const icon = document.getElementById('lightning-icon');
        const activeStorms = data.features.filter(f => f.properties.event.toLowerCase().includes('thunderstorm'));
        if (activeStorms.length > 0) {
            st.innerText = "STORM NEARBY";
            st.style.color = "var(--warning)";
            icon.style.color = "var(--warning)";
            icon.style.filter = "drop-shadow(0 0 8px var(--warning))";
        } else {
            st.innerText = "NONE DETECTED";
            st.style.color = "var(--success)";
            icon.style.color = "var(--success)";
            icon.style.filter = "none";
        }
    }

    async function searchLocation() {
        const input = document.getElementById('location-search');
        const q = input.value.trim();
        if (!q) return;
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=us&limit=1`;
        try {
            const res = await fetch(url, { headers: { 'User-Agent': UA } });
            const data = await res.json();
            if (data && data[0]) {
                currentLat = parseFloat(data[0].lat); 
                currentLon = parseFloat(data[0].lon);
                map.setView([currentLat, currentLon], 9);
                locationMarker.setLatLng([currentLat, currentLon]);
                getWeatherData();
                input.value = "";
            } else {
                input.style.borderColor = 'var(--danger)';
                setTimeout(() => input.style.borderColor = '#334155', 1000);
            }
        } catch (e) { console.error("Search failed"); }
    }
</script>
</body>
</html>
